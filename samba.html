<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Unidos do Alvorada | Samba-Enredo</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#003399">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a5f, #0a1628);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Fundo com partículas */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 215, 0, 0.3);
            border-radius: 50%;
            animation: floatParticle 8s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0.2;
            }
            50% {
                transform: translateY(-50px) translateX(30px);
                opacity: 0.6;
            }
        }

        /* Container principal */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px;
            max-width: 600px;
            width: 90%;
        }

        /* Card principal */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 50px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease-out;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        body.dark .card {
            background: rgba(30, 58, 95, 0.95);
            color: white;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Ícone animado */
        .icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                text-shadow: 0 0 0 rgba(255, 215, 0, 0);
            }
            50% {
                transform: scale(1.1);
                text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            }
        }

        /* Título */
        h1 {
            font-size: 2.5rem;
            color: #1e90ff;
            margin-bottom: 15px;
            font-weight: 900;
        }

        body.dark h1 {
            color: #FFD700;
        }

        /* Subtítulo */
        .subtitle {
            font-size: 1.1rem;
            color: #4a627a;
            margin-bottom: 30px;
        }

        body.dark .subtitle {
            color: #b0c4de;
        }

        /* Animação de loading */
        .loading-container {
            margin: 30px 0;
        }

        .loader {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            border: 5px solid rgba(30, 144, 255, 0.2);
            border-top: 5px solid #1e90ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        body.dark .loader {
            border-color: rgba(255, 215, 0, 0.2);
            border-top-color: #FFD700;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Texto de loading */
        .loading-text {
            font-size: 1rem;
            color: #1e90ff;
            font-weight: 600;
            letter-spacing: 2px;
        }

        body.dark .loading-text {
            color: #FFD700;
        }

        .loading-dots {
            display: inline-block;
            width: 60px;
            text-align: left;
        }

        .loading-dots span {
            animation: blink 1.4s infinite;
            animation-fill-mode: both;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }

        /* Texto Em breve */
        .embreve {
            font-size: 1.2rem;
            color: #ff9800;
            font-weight: bold;
            margin-top: 20px;
            animation: fadeInOut 2s infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Barra de progresso */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(30, 144, 255, 0.2);
            border-radius: 10px;
            margin-top: 30px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #1e90ff, #FFD700);
            border-radius: 10px;
            animation: progress 4s ease-in-out infinite;
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 0%; }
        }

        /* Botão voltar */
        .btn-voltar {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #1e90ff, #0a1628);
            color: white;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 30px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        body.dark .btn-voltar {
            background: linear-gradient(135deg, #FFD700, #1e3a5f);
            color: #0a1628;
        }

        .btn-voltar:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #FFD700, #1e90ff);
            color: #0a1628;
        }

        /* Tema button */
        .theme-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            border: none;
            border-radius: 50px;
            padding: 8px 20px;
            cursor: pointer;
            color: white;
            z-index: 100;
            font-weight: bold;
            transition: all 0.3s;
        }

        .theme-btn:hover {
            background: rgba(255,255,255,0.4);
        }

        /* Nota musical flutuante */
        .music-note {
            position: fixed;
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 999;
            animation: floatNote 4s ease-out forwards;
        }

        @keyframes floatNote {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-150px) rotate(20deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .card { padding: 30px 20px; }
            h1 { font-size: 1.8rem; }
            .icon { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()">🌓 TEMA</button>

<div class="particles" id="particles"></div>

<div class="container">
    <div class="card">
        <div class="icon">🎶</div>
        <h1>🎭 SAMBA-ENREDO 2027</h1>
        <p class="subtitle">A Unidos do Alvorada está preparando um samba inesquecível!</p>
        
        <div class="loading-container">
            <div class="loader"></div>
            <div class="loading-text">
                EM BREVE
                <div class="loading-dots">
                    <span>.</span><span>.</span><span>.</span>
                </div>
            </div>
        </div>
        
        <div class="embreve">
            🎵 AGUARDE, VAI VALE A PENA! 🎵
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        
        <a href="./index.html" class="btn-voltar">
            ← VOLTAR PARA A PAGINA INICIAL
        </a>
    </div>
</div>

<script>
    // Criar partículas
    function criarParticulas() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = Math.random() * 8 + 2 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.animationDuration = Math.random() * 6 + 3 + 's';
            container.appendChild(particle);
        }
    }
    
    // Criar notas musicais flutuantes
    function criarNotaMusical() {
        const notas = ['♪', '♫', '🎵', '🎶', '🥁'];
        const nota = document.createElement('div');
        nota.className = 'music-note';
        nota.textContent = notas[Math.floor(Math.random() * notas.length)];
        nota.style.left = Math.random() * 100 + '%';
        nota.style.bottom = '-20px';
        nota.style.fontSize = Math.random() * 20 + 15 + 'px';
        nota.style.color = `hsl(${Math.random() * 60 + 30}, 100%, 60%)`;
        document.body.appendChild(nota);
        
        setTimeout(() => {
            nota.remove();
        }, 4000);
    }
    
    function toggleTheme() {
        document.body.classList.toggle('dark');
        localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }
    
    // Carregar tema salvo
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
    }
    
    // Iniciar animações
    criarParticulas();
    setInterval(criarNotaMusical, 2000);
</script>

</body>
</html>
