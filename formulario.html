<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Unidos do Alvorada | Inscreva-se na Bateria</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #e8f0fe 0%, #dce6f5 100%);
            color: #0a1628;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body.dark {
            background: linear-gradient(135deg, #0a1628 0%, #0f1a30 100%);
            color: #ffffff;
        }

        body.dark .card {
            background: linear-gradient(135deg, #1e3a5f, #142142);
            border-color: rgba(255, 215, 0, 0.3);
        }

        body.dark input, body.dark select {
            background: #0f1a30;
            border-color: #1e3a5f;
            color: white;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 12px 20px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            border-bottom: 2px solid #1e90ff;
            transition: background 0.3s ease;
        }

        body.dark .header {
            background: rgba(10, 22, 40, 0.95);
            border-bottom-color: #FFD700;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            align-items: center;
        }

        .nav-links a {
            color: #0a1628;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            padding: 8px 0;
            position: relative;
        }

        body.dark .nav-links a {
            color: #ffffff;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: #1e90ff;
            transition: width 0.3s;
        }

        body.dark .nav-links a::after {
            background: #FFD700;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: #1e90ff;
        }

        body.dark .nav-links a:hover {
            color: #FFD700;
        }

        .nav-links a.active {
            color: #1e90ff;
        }

        body.dark .nav-links a.active {
            color: #FFD700;
        }

        .theme-btn {
            background: #1e90ff;
            border: none;
            border-radius: 50px;
            padding: 6px 16px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
        }

        .theme-btn:hover {
            transform: scale(1.05);
            background: #FFD700;
            color: #0a1628;
        }

        body.dark .theme-btn {
            background: #FFD700;
            color: #0a1628;
        }

        body.dark .theme-btn:hover {
            background: #1e90ff;
            color: white;
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 20px 40px;
        }

        .card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            border: 1px solid rgba(30, 144, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: background 0.3s;
            max-width: 800px;
            margin: 0 auto;
        }

        .card h1 {
            color: #1e90ff;
            margin-bottom: 10px;
            text-align: center;
        }

        body.dark .card h1 {
            color: #FFD700;
        }

        .card p {
            text-align: center;
            margin-bottom: 30px;
            color: #4a627a;
        }

        body.dark .card p {
            color: #b0c4de;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        label .obrigatorio {
            color: #ff4444;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #1e90ff;
            box-shadow: 0 0 5px rgba(30, 144, 255, 0.3);
        }

        .cep-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .cep-row input {
            flex: 2;
        }

        .btn-buscar {
            background: #1e90ff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-buscar:hover {
            background: #FFD700;
            color: #0a1628;
            transform: scale(1.02);
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-enviar {
            background: linear-gradient(135deg, #1e90ff, #0a1628);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 20px;
        }

        body.dark .btn-enviar {
            background: linear-gradient(135deg, #FFD700, #1e3a5f);
            color: #0a1628;
        }

        .btn-enviar:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #FFD700, #1e90ff);
            color: #0a1628;
        }

        .btn-enviar:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alerta {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #00cc66;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            animation: fadeOut 3s forwards;
            z-index: 1000;
        }

        .alerta-erro {
            background: #ff4444;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0); }
            70% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(20px); visibility: hidden; }
        }

        @media (max-width: 768px) {
            .card { padding: 25px; }
            .row-2 { grid-template-columns: 1fr; gap: 20px; }
            .cep-row { flex-direction: column; }
            .btn-buscar { width: 100%; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-container">
        <div class="nav-links">
            <a href="index.html">INÍCIO</a>
            <a href="formulario.html" class="active">INSCREVA-SE</a>
            <a href="chamada.html">CHAMADA</a>
            <a href="ranking.html">RANKING</a>
            <button class="theme-btn" id="themeToggle" onclick="toggleTheme()">🌓 TEMA</button>
        </div>
    </div>
</div>

<div class="main-content">
    <div class="card">
        <h1>🥁 INSCREVA-SE NA BATERIA</h1>
        <p>Preencha o formulário abaixo para fazer parte da Unidos do Alvorada</p>

        <form id="formInscricao">
            <div class="form-group">
                <label>Nome completo <span class="obrigatorio">*</span></label>
                <input type="text" id="nome" placeholder="Digite seu nome completo" required>
            </div>

            <div class="row-2">
                <div class="form-group">
                    <label>Data de nascimento <span class="obrigatorio">*</span></label>
                    <input type="date" id="dataNasc" required>
                </div>
                <div class="form-group">
                    <label>Telefone (WhatsApp) <span class="obrigatorio">*</span></label>
                    <input type="tel" id="telefone" placeholder="(92) 99999-9999" required>
                </div>
            </div>

            <div class="form-group">
                <label>E-mail <span style="color:#999;">(opcional)</span></label>
                <input type="email" id="email" placeholder="carlinhos@email.com">
            </div>

            <div class="form-group">
                <label>CEP <span class="obrigatorio">*</span></label>
                <div class="cep-row">
                    <input type="text" id="cep" placeholder="69043-610" required>
                    <button type="button" class="btn-buscar" onclick="buscarCEP()">🔍 BUSCAR</button>
                </div>
            </div>

            <div class="form-group">
                <label>Endereço (rua) <span class="obrigatorio">*</span></label>
                <input type="text" id="endereco" placeholder="Rua São Bernardo" required>
            </div>

            <div class="row-2">
                <div class="form-group">
                    <label>Número <span class="obrigatorio">*</span></label>
                    <input type="text" id="numero" placeholder="93" required>
                </div>
                <div class="form-group">
                    <label>Bairro <span class="obrigatorio">*</span></label>
                    <input type="text" id="bairro" placeholder="Alvorada I" required>
                </div>
            </div>

            <div class="row-2">
                <div class="form-group">
                    <label>Cidade <span class="obrigatorio">*</span></label>
                    <input type="text" id="cidade" placeholder="Manaus" required>
                </div>
                <div class="form-group">
                    <label>Estado <span class="obrigatorio">*</span></label>
                    <select id="estado" required>
                        <option value="">Selecione</option>
                        <option value="AC">Acre</option>
                        <option value="AL">Alagoas</option>
                        <option value="AP">Amapá</option>
                        <option value="AM" selected>Amazonas</option>
                        <option value="BA">Bahia</option>
                        <option value="CE">Ceará</option>
                        <option value="DF">Distrito Federal</option>
                        <option value="ES">Espírito Santo</option>
                        <option value="GO">Goiás</option>
                        <option value="MA">Maranhão</option>
                        <option value="MT">Mato Grosso</option>
                        <option value="MS">Mato Grosso do Sul</option>
                        <option value="MG">Minas Gerais</option>
                        <option value="PA">Pará</option>
                        <option value="PB">Paraíba</option>
                        <option value="PR">Paraná</option>
                        <option value="PE">Pernambuco</option>
                        <option value="PI">Piauí</option>
                        <option value="RJ">Rio de Janeiro</option>
                        <option value="RN">Rio Grande do Norte</option>
                        <option value="RS">Rio Grande do Sul</option>
                        <option value="RO">Rondônia</option>
                        <option value="RR">Roraima</option>
                        <option value="SC">Santa Catarina</option>
                        <option value="SP">São Paulo</option>
                        <option value="SE">Sergipe</option>
                        <option value="TO">Tocantins</option>
                    </select>
                </div>
            </div>

            <div class="row-2">
                <div class="form-group">
                    <label>Instrumento <span class="obrigatorio">*</span></label>
                    <select id="instrumento" required>
                        <option value="">Selecione</option>
                        <option value="Surdo">🥁 Surdo</option>
                        <option value="Caixa">🥁 Caixa</option>
                        <option value="Repique">🥁 Repique</option>
                        <option value="Tamborim">🥁 Tamborim</option>
                        <option value="Chocalho">🥁 Chocalho</option>
                        <option value="Cuíca">🥁 Cuíca</option>
                        <option value="Agogô">🥁 Agogô</option>
                        <option value="Prato">🥁 Prato</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nível de experiência <span class="obrigatorio">*</span></label>
                    <select id="nivel" required>
                        <option value="">Selecione</option>
                        <option value="Primeira vez">🟢 Primeira vez - Nunca toquei</option>
                        <option value="Básico">🔵 Básico - Já toquei algumas vezes</option>
                        <option value="Intermediário">🟡 Intermediário - Toco bem, quero evoluir</option>
                        <option value="Avançado">🔴 Avançado - Já toquei em bateria de escola</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Tamanho da blusa <span class="obrigatorio">*</span></label>
                <select id="blusa" required>
                    <option value="">Selecione</option>
                    <option value="PP">👕 PP - Extra pequeno</option>
                    <option value="P">👕 P - Pequeno</option>
                    <option value="M">👕 M - Médio</option>
                    <option value="G">👕 G - Grande</option>
                    <option value="GG">👕 GG - Extra grande</option>
                    <option value="GGG">👕 GGG - Extra extra grande</option>
                    <option value="XGG">👕 XGG - Especial</option>
                </select>
            </div>

            <button type="button" class="btn-enviar" id="btnEnviar" onclick="enviarFormulario()">💾 ENVIAR SOLICITAÇÃO</button>
        </form>
    </div>
</div>

<script>
    function toggleTheme() {
        const body = document.body;
        if (body.classList.contains('dark')) {
            body.classList.remove('dark');
            localStorage.setItem('theme', 'light');
        } else {
            body.classList.add('dark');
            localStorage.setItem('theme', 'dark');
        }
    }

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        document.body.classList.add('dark');
    } else {
        document.body.classList.remove('dark');
    }

    // Máscaras
    document.getElementById('telefone').addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length > 11) value = value.slice(0, 11);
        if (value.length >= 2) value = `(${value.slice(0, 2)}) ${value.slice(2)}`;
        if (value.length > 10) value = `${value.slice(0, 10)}-${value.slice(10)}`;
        e.target.value = value;
    });

    document.getElementById('cep').addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length > 8) value = value.slice(0, 8);
        if (value.length > 5) value = `${value.slice(0, 5)}-${value.slice(5)}`;
        e.target.value = value;
    });

    async function buscarCEP() {
        let cep = document.getElementById('cep').value.replace(/\D/g, '');
        if (cep.length !== 8) {
            mostrarAlerta('CEP inválido! Digite 8 números.', true);
            return;
        }
        mostrarAlerta('🔍 Buscando endereço...', false, 1000);
        try {
            const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await response.json();
            if (data.erro) {
                mostrarAlerta('CEP não encontrado!', true);
                return;
            }
            document.getElementById('endereco').value = data.logradouro || '';
            document.getElementById('bairro').value = data.bairro || '';
            document.getElementById('cidade').value = data.localidade || '';
            document.getElementById('estado').value = data.uf || '';
            mostrarAlerta('✅ Endereço preenchido!', false);
        } catch (error) {
            mostrarAlerta('Erro ao buscar CEP.', true);
        }
    }

    const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbz5f4AQfn7QgejhRbYW0SNCXku-DJzYTgI2V_VzI-3L91hV5fzMS12ovIXPRH65j6dhQA/exec';

    async function enviarFormulario() {
        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;
        btn.textContent = '⏳ ENVIANDO...';

        const dados = {
            nome: document.getElementById('nome').value.trim(),
            dataNasc: document.getElementById('dataNasc').value,
            telefone: document.getElementById('telefone').value.trim(),
            email: document.getElementById('email').value.trim(),
            cep: document.getElementById('cep').value.trim(),
            endereco: document.getElementById('endereco').value.trim(),
            numero: document.getElementById('numero').value.trim(),
            bairro: document.getElementById('bairro').value.trim(),
            cidade: document.getElementById('cidade').value.trim(),
            estado: document.getElementById('estado').value,
            instrumento: document.getElementById('instrumento').value,
            nivel: document.getElementById('nivel').value,
            blusa: document.getElementById('blusa').value,
            dataCadastro: new Date().toLocaleString('pt-BR'),
            status: 'Pendente'
        };

        // Validação
        if (!dados.nome) { mostrarAlerta('❌ Preencha o Nome!', true); habilitarBotao(btn); return; }
        if (!dados.dataNasc) { mostrarAlerta('❌ Preencha a Data de nascimento!', true); habilitarBotao(btn); return; }
        if (!dados.telefone) { mostrarAlerta('❌ Preencha o Telefone!', true); habilitarBotao(btn); return; }
        if (!dados.cep) { mostrarAlerta('❌ Preencha o CEP!', true); habilitarBotao(btn); return; }
        if (!dados.endereco) { mostrarAlerta('❌ Preencha o Endereço!', true); habilitarBotao(btn); return; }
        if (!dados.numero) { mostrarAlerta('❌ Preencha o Número!', true); habilitarBotao(btn); return; }
        if (!dados.bairro) { mostrarAlerta('❌ Preencha o Bairro!', true); habilitarBotao(btn); return; }
        if (!dados.cidade) { mostrarAlerta('❌ Preencha a Cidade!', true); habilitarBotao(btn); return; }
        if (!dados.estado) { mostrarAlerta('❌ Selecione o Estado!', true); habilitarBotao(btn); return; }
        if (!dados.instrumento) { mostrarAlerta('❌ Selecione o Instrumento!', true); habilitarBotao(btn); return; }
        if (!dados.nivel) { mostrarAlerta('❌ Selecione o Nível de experiência!', true); habilitarBotao(btn); return; }
        if (!dados.blusa) { mostrarAlerta('❌ Selecione o Tamanho da blusa!', true); habilitarBotao(btn); return; }

        // Backup local
        let inscricoes = JSON.parse(localStorage.getItem('inscricoes')) || [];
        inscricoes.push(dados);
        localStorage.setItem('inscricoes', JSON.stringify(inscricoes));

        // Envio para planilha
        try {
            const response = await fetch(URL_SCRIPT, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });
            
            mostrarAlerta('✅ Solicitação enviada com sucesso! Os dados foram salvos.', false);
            document.getElementById('formInscricao').reset();
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
            
        } catch (error) {
            console.error('Erro:', error);
            mostrarAlerta('⚠️ Dados salvos localmente. Não foi possível conectar com a planilha agora.', true);
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 3000);
        }
        
        habilitarBotao(btn);
    }

    function habilitarBotao(btn) {
        btn.disabled = false;
        btn.textContent = '💾 ENVIAR SOLICITAÇÃO';
    }

    function mostrarAlerta(msg, isErro, tempo = 3000) {
        const alerta = document.createElement('div');
        alerta.className = `alerta ${isErro ? 'alerta-erro' : ''}`;
        alerta.textContent = msg;
        document.body.appendChild(alerta);
        setTimeout(() => alerta.remove(), tempo);
    }
</script>

</body>
</html>
