<!-- TELA DE CARREGAMENTO ANIMADA -->
<div id="splashScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #003399, #0047AB); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;">
    
    <!-- Logo pulsante -->
    <div style="animation: pulse 1s infinite; margin-bottom: 20px;">
        <span style="font-size: 80px;">🥁</span>
    </div>
    
    <!-- Título -->
    <h1 style="color: #FFD700; font-family: 'Montserrat', sans-serif; font-size: 28px; margin-bottom: 10px;">UNIDOS DO ALVORADA</h1>
    
    <!-- Barra de progresso -->
    <div style="width: 80%; max-width: 300px; height: 8px; background: rgba(255,255,255,0.3); border-radius: 10px; margin: 20px 0; overflow: hidden;">
        <div id="progressBar" style="width: 0%; height: 100%; background: #FFD700; border-radius: 10px; transition: width 0.5s ease;"></div>
    </div>
    
    <!-- Mensagem de carregamento -->
    <p id="loadingText" style="color: white; font-size: 14px; margin-bottom: 15px;">Carregando...</p>
    
    <!-- Frase animada -->
    <p id="fraseAnimada" style="color: #FFD700; font-size: 14px; text-align: center; max-width: 80%; font-style: italic;">ARROCHA ALVORADA 🎵</p>
</div>

<style>
    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
    }
</style>

<script>
    // Frases do index (mesmas)
    const frases = [
        "ARROCHA ALVORADA 🎵",
        "A SAUDADE APERTOU 🎵",
        "A ESPERANÇA CONTINUA 🎵",
        "Esse é meu lugar, a minha raiz, eu sou Alvorada, eu sou feliz 🎵",
        "Alvorada do meu, do seu, do nosso coração 🎵"
    ];
    
    let indice = 0;
    const progressBar = document.getElementById('progressBar');
    const fraseElement = document.getElementById('fraseAnimada');
    const splash = document.getElementById('splashScreen');
    
    // Atualizar a cada 1 segundo
    const intervalo = setInterval(() => {
        indice++;
        
        if (indice < frases.length) {
            // Muda a frase
            fraseElement.textContent = frases[indice];
            // Atualiza a barra (20% por frase, 5 frases = 100%)
            const percentual = (indice / (frases.length - 1)) * 100;
            progressBar.style.width = percentual + '%';
        } else {
            // Última frase: completa a barra e some
            progressBar.style.width = '100%';
            clearInterval(intervalo);
            
            // Aguarda 0.5s e some com efeito fade
            setTimeout(() => {
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 500);
            }, 500);
        }
    }, 1000);
</script>
